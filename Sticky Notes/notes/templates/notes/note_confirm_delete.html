{% extends 'notes/base.html' %}

{% block content %}
    <h2>Delete Note</h2>
    <p>Are you sure you want to delete the note "{{ note.title }}"?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-delete">Yes, Delete</button>
        <a href="{% url 'note_list' %}" style="margin-left: 10px;">Cancel</a>
    </form>
{% endblock %}
