<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Learning Board</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="teacher">
    <img id="teacherImg" src="./media/middle.png" alt="Teacher">

<div class="board">

    <div class="box" 
    onmouseover="changeTeacher('up')" 
    onmouseleave="resetTeacher()">
    English
    </div>

    <div class="box" 
    onmouseover="changeTeacher('middle')" 
    onmouseleave="resetTeacher()">
    Urdu
    </div>

    <div class="box" 
    onmouseover="changeTeacher('down')" 
    onmouseleave="resetTeacher()">
    Maths
    </div>

</div>

</div>

</div>

<script src="script.js"></script>
</body>
</html>
