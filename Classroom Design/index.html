<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Board</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Score Board -->
    <div id="scoreBoard" class="score-board">Score: <span id="scoreValue">0</span></div>

    <div class="container">
        <div class="teacher">
            <div id="speechBubble" class="speech-bubble">Hello! Let's learn together!</div>
            <img id="teacherImg" src="./media/middle.png" alt="Teacher">
        </div>

        <div class="board">
            <div class="box" data-subject="english" onmouseover="changeTeacher('up', 'English')"
                onmouseleave="resetTeacher()">
                English
            </div>

            <div class="box" data-subject="urdu" onmouseover="changeTeacher('middle', 'Urdu')"
                onmouseleave="resetTeacher()">
                Urdu
            </div>

            <div class="box" data-subject="maths" onmouseover="changeTeacher('down', 'Maths')"
                onmouseleave="resetTeacher()">
                Maths
            </div>
        </div>
    </div>

    <!-- Decorative Elements -->
    <div class="decor plant-left">
        <div class="flower"></div>
        <div class="leaf"></div>
    </div>



    <div class="butterfly">
        <div class="wing left"></div>
        <div class="wing right"></div>
    </div>

    <!-- Dustbin -->
    <div id="dustbin" class="dustbin">
        <div class="icon">🗑️</div>
    </div>

    <!-- Paper Balls -->
    <div class="paper-ball" id="paper1" style="bottom: 15%; left: 15%;"></div>
    <div class="paper-ball" id="paper2" style="bottom: 8%; left: 45%;"></div>
    <div class="paper-ball" id="paper3" style="bottom: 12%; left: 75%;"></div>

    <script src="script.js"></script>
</body>

</html>
